resources:
  jobs:
    eco_resilience_dlt_job:
      name: eco_resilience_dlt_job
      tasks:
        - task_key: trigger_sdp_pipeline
          disabled: false
          email_notifications: {}
          pipeline_task:
            pipeline_id: ${resources.pipelines.eco_resilience_dlt.id}
          run_if: ALL_SUCCESS
          timeout_seconds: 0
      email_notifications:
        on_failure:
          - wzhang3@cartology.com.au
      max_concurrent_runs: 1
      notification_settings:
        no_alert_for_skipped_runs: true
      performance_target: PERFORMANCE_OPTIMIZED
      timeout_seconds: 0
      trigger:
        pause_status: UNPAUSED
        periodic:
          interval: 6
          unit: HOURS
      webhook_notifications: {}
