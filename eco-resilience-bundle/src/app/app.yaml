command:
  - gunicorn
  - app:app
  - --bind
  - 0.0.0.0:8000
  - --workers
  - "2"
  - --timeout
  - "300"
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: dc189fe4fd0f924b
  - name: ECORESILIENCE_JOB_ID
    value: "1009568797220506"
  - name: ECORESILIENCE_AGENT_ENDPOINT
    value: "eco_resilience_agent"

  # Lakebase (OLTP grant history). LAKEBASE_USER is the app's service principal
  # application_id (UUID) — that's the Postgres "username" the JWT auth uses.
  - name: LAKEBASE_HOST
    value: "ep-noisy-sky-d8m7yunu.database.us-east-2.cloud.databricks.com"
  - name: LAKEBASE_DB
    value: "databricks_postgres"
  - name: LAKEBASE_USER
    value: "692e74d4-b772-4c97-8b2c-c0edbc5ea1f8"
  - name: LAKEBASE_INSTANCE_NAME
    value: "grant-history-db"
